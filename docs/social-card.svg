<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0e1a2b"/>
      <stop offset="1" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#2ea043"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- job/pipeline motif, top-right: cloud -> device -> check -->
  <g stroke="#3fb950" stroke-opacity="0.35" stroke-width="2.5" fill="none">
    <line x1="930" y1="120" x2="1010" y2="120"/>
    <line x1="1050" y1="120" x2="1130" y2="120"/>
  </g>
  <g font-size="30" text-anchor="middle">
    <text x="912"  y="130" fill="#3fb950" fill-opacity="0.55">☁</text>
    <text x="1030" y="131" fill="#3fb950" fill-opacity="0.55">▣</text>
    <text x="1148" y="131" fill="#3fb950" fill-opacity="0.7">✓</text>
  </g>

  <!-- left accent bar -->
  <rect x="0" y="0" width="10" height="630" fill="url(#accent)"/>

  <!-- top labels -->
  <text x="80" y="120" fill="#3fb950" font-size="26" font-weight="700" letter-spacing="3">RUST · GREENGRASS COMPONENT</text>

  <!-- title -->
  <text x="78" y="238" fill="#ffffff" font-size="82" font-weight="800" letter-spacing="-1">nucleus-job-plugin</text>

  <!-- tagline -->
  <text x="80" y="298" fill="#c9d1d9" font-size="34" font-weight="500">AWS IoT Jobs execution for Greengrass —</text>
  <text x="80" y="342" fill="#c9d1d9" font-size="34" font-weight="500">without clashing with the Greengrass nucleus.</text>

  <!-- feature bullets -->
  <g fill="#e6edf3" font-size="26">
    <circle cx="92" cy="416" r="6" fill="#3fb950"/>
    <text x="116" y="424">Reuses the Greengrass nucleus's MQTT connection via IPC</text>
    <circle cx="92" cy="460" r="6" fill="#3fb950"/>
    <text x="116" y="468">No second connection, no client-ID clash, no extra cert</text>
    <circle cx="92" cy="504" r="6" fill="#3fb950"/>
    <text x="116" y="512">Runs all AWS managed job templates · proven on hardware</text>
  </g>

  <!-- footer -->
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#233" stroke-width="1.5"/>
  <text x="80" y="600" fill="#8b98a5" font-size="24" font-weight="600">Job execution only · generic component</text>
  <text x="1120" y="600" fill="#8b98a5" font-size="22" text-anchor="end">Apache-2.0 / MIT · unofficial, not affiliated with Amazon</text>
</svg>
